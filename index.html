<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<title>Otobank — Distributed Automotive Commerce</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="tokens.css" />
<style>
  html, body { margin:0; padding:0; background:#0a0d11; color:#F5F5F5; font-family:"Inter",system-ui,sans-serif; }
  svg { display:block; }
  * { box-sizing: border-box; }

  /* App shell */
  .app { display:grid; grid-template-columns: 280px 1fr; min-height:100vh; }
  .sidebar { background:#0F1419; border-right:1px solid #2D343F; padding:24px 0; position:sticky; top:0; height:100vh; overflow-y:auto; }
  .sidebar-header { padding:0 24px 20px; border-bottom:1px solid #2D343F; margin-bottom:16px; }
  .sidebar-title { font-family:"Space Grotesk",sans-serif; font-weight:700; font-size:20px; }
  .sidebar-sub { font-size:11px; color:#6B7280; margin-top:4px; font-family:"JetBrains Mono",monospace; letter-spacing:0.05em; }
  .sidebar h4 { font-family:"JetBrains Mono",monospace; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:#6B7280; margin: 18px 24px 8px; font-weight:600; }
  .nav-item { display:flex; align-items:center; gap:10px; padding:9px 24px; color:#A0A4AB; text-decoration:none; cursor:pointer; font-size:13px; border:none; background:transparent; width:100%; text-align:left; font-family:inherit; }
  .nav-item:hover { background:#1A1F26; color:#F5F5F5; }
  .nav-item.active { background:rgba(232,93,44,0.12); color:#E85D2C; border-left:3px solid #E85D2C; padding-left:21px; }
  .nav-num { font-family:"JetBrains Mono",monospace; font-size:11px; color:#6B7280; width:22px; }
  .nav-item.active .nav-num { color:#E85D2C; }
  .nav-item .nav-tag { font-family:"JetBrains Mono",monospace; font-size:9px; padding:2px 6px; border-radius:4px; margin-left:auto; letter-spacing:0.05em; }
  .nav-item.out-of-scope { opacity:0.45; }
  .nav-item.out-of-scope:hover { opacity:0.7; }
  .nav-item.out-of-scope .nav-tag { background:rgba(107,114,128,0.2); color:#6B7280; border:1px solid #2D343F; }
  .nav-item.placeholder .nav-tag { background:rgba(232,93,44,0.15); color:#E85D2C; border:1px solid rgba(232,93,44,0.3); }

  /* Main */
  .main { display:flex; flex-direction:column; min-height:100vh; }
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:16px 32px; border-bottom:1px solid #2D343F; background:#0F1419; position:sticky; top:0; z-index:10; }
  .topbar-info .eyebrow { font-family:"JetBrains Mono",monospace; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:#E85D2C; font-weight:600; }
  .topbar-info h1 { font-family:"Space Grotesk",sans-serif; font-size:20px; margin:4px 0 0; font-weight:700; letter-spacing:-0.01em; }
  .pager { display:flex; align-items:center; gap:8px; font-family:"JetBrains Mono",monospace; font-size:12px; color:#A0A4AB; }
  .pager button { background:#1A1F26; border:1px solid #2D343F; color:#F5F5F5; width:34px; height:34px; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; font-family:inherit; }
  .pager button:hover:not(:disabled) { background:#242A33; border-color:#E85D2C; }
  .pager button:disabled { opacity:0.35; cursor:not-allowed; }
  .pager .count { padding: 0 10px; }

  .stage { flex:1; padding:32px; display:flex; align-items:flex-start; justify-content:center; overflow:auto; }
  .frame-wrap { width:100%; max-width:1600px; }
  .frame-meta { display:flex; align-items:baseline; gap:14px; margin-bottom:14px; padding: 0 4px; }
  .frame-meta .num { font-family:"JetBrains Mono",monospace; font-size:13px; color:#6B7280; font-weight:600; }
  .frame-meta .name { font-size:16px; color:#F5F5F5; font-weight:600; }
  .frame-meta .dim { margin-left:auto; font-family:"JetBrains Mono",monospace; font-size:11px; color:#6B7280; }
  .frame { background:#1A1F26; border:1px solid #2D343F; border-radius:14px; overflow:hidden; box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
  .frame > div { display:flex; justify-content:center; }

  @media (max-width: 980px) { .app { grid-template-columns: 1fr; } .sidebar { display:none; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="screens-1-2.jsx"></script>
<script type="text/babel" src="screens-3-4.jsx"></script>
<script type="text/babel" src="screens-5-8.jsx"></script>
<script type="text/babel" src="screens-9-12.jsx"></script>
<script type="text/babel" src="screens-13-14.jsx"></script>
<script type="text/babel" src="screens-17-18.jsx"></script>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "accent": "#E85D2C",
  "accent2": "#FFB800"
}/*EDITMODE-END*/;

const SCREENS = [
  // ── 1 · CUSTOMER SURFACE — what the buyer actually arrives at ──
  { n: '01', name: 'Landing — Otobank brand site',          dim: '1440 × 1900',  group: '1 · Customer Surface',         comp: 'Screen01_Landing' },
  { n: '02', name: 'AC Showroom (Public)',                  dim: '1440 × 3400',  group: '1 · Customer Surface',         comp: 'Screen18_ACShowroom', tag: 'WOW' },

  // ── 2 · AC DISTRIBUTION NETWORK — the people running those funnels ──
  { n: '03', name: 'AC Working Space (Desktop)',            dim: '1440 × 1800',  group: '2 · AC Distribution Network',  comp: 'Screen17_ACWorkspace', tag: 'NEW' },
  { n: '04', name: 'AC Sales Mobile App',                   dim: 'iPhone 14 Pro', group: '2 · AC Distribution Network',  comp: 'Screen08_Mobile' },

  // ── 3 · CUSTOMER BUYING FLOW — discovery → delivery ──
  { n: '05', name: 'Inventory Browse',                      dim: '1440 × 1500',  group: '3 · Customer Buying Flow',     comp: 'Screen02_Browse' },
  { n: '06', name: 'Vehicle Detail Page',                   dim: '1440 × 2400',  group: '3 · Customer Buying Flow',     comp: 'Screen03_VDP' },
  { n: '07', name: '200-pt Inspection Report',              dim: '1440 × 1900',  group: '3 · Customer Buying Flow',     comp: 'Screen04_Inspection' },
  { n: '08', name: 'Pre-approval Financing',                dim: '1440 × 1500',  group: '3 · Customer Buying Flow',     comp: 'Screen07_Financing' },
  { n: '09', name: 'Checkout / Order',                      dim: '1440 × 1500',  group: '3 · Customer Buying Flow',     comp: 'Screen05_Checkout' },
  { n: '10', name: 'Order Tracking',                        dim: '1440 × 1300',  group: '3 · Customer Buying Flow',     comp: 'Screen09_Tracking' },

  // ── 4 · INVENTORY CORE — the central pool every AC pulls from ──
  { n: '11', name: 'Inventory (Shared) — Nguồn hàng tổng',  dim: '1440 × 1900',  group: '4 · Inventory Core',           comp: 'Screen10_InventoryShared', tag: 'CORE' },

  // ── 5 · SUPPLY SOURCING — how cars enter Inventory (Shared) ──
  { n: '12', name: 'Sell My Car (AI)',                      dim: '1440 × 1500',  group: '5 · Supply Sourcing',          comp: 'Screen06_Sell' },
  { n: '13', name: 'IS Web Console (Desktop)',              dim: '1440 × 1800',  group: '5 · Supply Sourcing',          comp: 'Screen15_ISWeb', placeholder: true, tag: 'NEW' },
  { n: '14', name: 'IS App (Mobile)',                       dim: 'iPhone 14 Pro', group: '5 · Supply Sourcing',          comp: 'Screen14_ISApp', placeholder: true, tag: 'NEW' },

  // ── 6 · B2B WHOLESALE MOAT — dealer-to-dealer auction layer ──
  { n: '15', name: 'Wholesale Auction (Desktop)',           dim: '1440 × 1400',  group: '6 · B2B Wholesale Moat',       comp: 'Screen13_WholesaleAuction', placeholder: true, tag: 'NEW' },
  { n: '16', name: 'Wholesale Auction (Mobile)',            dim: 'iPhone 14 Pro', group: '6 · B2B Wholesale Moat',       comp: 'Screen16_WholesaleAuctionMobile', placeholder: true, tag: 'NEW' },

  // ── 7 · DATA MOAT — AI pricing engine powering everything above ──
  { n: '17', name: 'AI Pricing Intelligence',               dim: '1440 × 2400',  group: '7 · Data Moat',                comp: 'Screen11_AIPricing' },
];

// Group screens for the sidebar
const GROUPS = SCREENS.reduce((acc, s) => {
  (acc[s.group] = acc[s.group] || []).push(s);
  return acc;
}, {});

function App() {
  const t = useTweaks(TWEAK_DEFAULTS);
  const [idx, setIdx] = React.useState(() => {
    const h = parseInt((location.hash || '').replace('#screen-', ''), 10);
    return Number.isFinite(h) && h >= 1 && h <= SCREENS.length ? h - 1 : 0;
  });

  React.useEffect(() => {
    document.documentElement.dataset.theme = t.theme;
    document.documentElement.style.setProperty('--accent', t.accent);
    document.documentElement.style.setProperty('--accent-2', t.accent2);
  }, [t.theme, t.accent, t.accent2]);

  React.useEffect(() => {
    location.hash = `screen-${SCREENS[idx].n}`;
    document.querySelector('.stage')?.scrollTo(0, 0);
  }, [idx]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.isContentEditable) return;
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'j') setIdx(i => Math.min(SCREENS.length - 1, i + 1));
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'k') setIdx(i => Math.max(0, i - 1));
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const cur = SCREENS[idx];
  const Cmp = window[cur.comp];

  return (
    <>
      <div className="app">
        <nav className="sidebar">
          <div className="sidebar-header">
            <div className="sidebar-title">Otobank</div>
            <div className="sidebar-sub">PRD MVP v3 · 17 màn hình</div>
          </div>
          {Object.entries(GROUPS).map(([group, list]) => (
            <div key={group}>
              <h4>{group}</h4>
              {list.map(s => {
                const sIdx = SCREENS.indexOf(s);
                const cls = [
                  'nav-item',
                  sIdx === idx ? 'active' : '',
                  s.outOfScope ? 'out-of-scope' : '',
                  s.placeholder ? 'placeholder' : '',
                ].filter(Boolean).join(' ');
                return (
                  <button key={s.n} className={cls} onClick={() => setIdx(sIdx)}>
                    <span className="nav-num">{s.n}</span>
                    <span style={{ flex: 1 }}>{s.name}</span>
                    {s.tag && <span className="nav-tag">{s.tag}</span>}
                  </button>
                );
              })}
            </div>
          ))}
        </nav>

        <div className="main">
          <div className="topbar">
            <div className="topbar-info">
              <div className="eyebrow">{cur.group}</div>
              <h1>{cur.n} · {cur.name}</h1>
            </div>
            <div className="pager">
              <button onClick={() => setIdx(i => Math.max(0, i - 1))} disabled={idx === 0} title="Trước (←)">‹</button>
              <span className="count">{idx + 1} / {SCREENS.length}</span>
              <button onClick={() => setIdx(i => Math.min(SCREENS.length - 1, i + 1))} disabled={idx === SCREENS.length - 1} title="Sau (→)">›</button>
            </div>
          </div>

          <div className="stage">
            <div className="frame-wrap">
              <div className="frame-meta">
                <span className="num">{cur.n}</span>
                <span className="name">{cur.name}</span>
                <span className="dim">{cur.dim} · phím ← → để chuyển trang</span>
              </div>
              <div className="frame">
                <div>
                  {Cmp ? <Cmp /> : <div style={{ padding: 80, color: '#6B7280' }}>Missing component: {cur.comp}</div>}
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Theme">
          <TweakRadio
            label="Mode"
            value={t.theme}
            onChange={v => t.setTweak('theme', v)}
            options={[{ value: 'dark', label: 'Dark' }, { value: 'light', label: 'Light' }]}
          />
        </TweakSection>
        <TweakSection title="Brand color">
          <TweakColor label="Primary" value={t.accent} onChange={v => t.setTweak('accent', v)}
            options={['#E85D2C','#0E5DAD','#10B981','#7C3AED']} />
          <TweakColor label="Highlight" value={t.accent2} onChange={v => t.setTweak('accent2', v)}
            options={['#FFB800','#F472B6','#34D399','#FBBF24']} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
